name: Build Android APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Unzip Project
        run: |
          unzip -o PulseLauncher.zip
          cd PulseLauncher
          chmod +x gradlew || true

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Debug APK
        run: |
          cd PulseLauncher
          if [ -f "./gradlew" ]; then
            ./gradlew assembleDebug
          else
            gradle assembleDebug
          fi

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PulseLauncher-APK
          path: PulseLauncher/app/build/outputs/apk/debug/*.apk
          
